        <circle cx="10" cy="11" r="3" fill="#e0af68"/>
        <text x="22" y="15" fill="#e0af68" font-weight="600">led_to</text>
        <text x="70" y="15" fill="#8a94a6">eurotruss traverse</text>
        <rect x="0" y="28" width="248" height="22" rx="4" fill="#14181d" stroke="#232a33"/>
        <circle cx="10" cy="39" r="3" fill="#7aa2f7"/>
        <text x="22" y="43" fill="#7aa2f7" font-weight="600">related</text>
        <text x="70" y="43" fill="#8a94a6">robe forte · weight 0.85</text>
        <rect x="0" y="56" width="248" height="22" rx="4" fill="#14181d" stroke="#232a33"/>
        <circle cx="10" cy="67" r="3" fill="#7aa2f7"/>
        <text x="22" y="71" fill="#7aa2f7" font-weight="600">related</text>
        <text x="70" y="71" fill="#8a94a6">csv mapping · weight 0.81</text>
        <rect x="0" y="84" width="248" height="22" rx="4" fill="#14181d" stroke="#232a33"/>
        <circle cx="10" cy="95" r="3" fill="#f7768e"/>
        <text x="22" y="99" fill="#f7768e" font-weight="600">contradicts</text>
        <text x="70" y="99" fill="#8a94a6">csv mapping (by conscience)</text>
      </g>

      <text y="336" fill="#c3cee7" font-size="11" font-weight="600">history</text>
      <g font-size="9.5" fill="#8a94a6" font-family="ui-monospace,Menlo,monospace" transform="translate(0,350)">
        <text y="0">14:22  used_in_response</text>
        <text y="14">14:03  coactivation_update (+0.05)</text>
        <text y="28">11:51  chain_created related→robe</text>
        <text y="42">03:05  sws/pattern-consolidate</text>
        <text y="56">09:12  created</text>
      </g>

      <text y="440" fill="#c3cee7" font-size="11" font-weight="600">stats</text>
      <g font-size="10" transform="translate(0,456)" fill="#8a94a6">
        <text y="0">degree</text><text x="240" y="0" text-anchor="end" fill="#e6e9ef">12</text>
        <text y="16">hebb-evidence</text><text x="240" y="16" text-anchor="end" fill="#e6e9ef">3</text>
        <text y="32">betweenness</text><text x="240" y="32" text-anchor="end" fill="#e6e9ef">0.18</text>
        <text y="48">cluster-id</text><text x="240" y="48" text-anchor="end" fill="#e6e9ef">eurotruss</text>
