  <!-- background card -->
  <rect width="1200" height="750" fill="#0b0d10"/>
  <rect x="20" y="20" width="1160" height="710" rx="14" fill="#14181d" stroke="#232a33"/>

  <!-- header / toolbar -->
  <g transform="translate(40,45)">
    <text x="0" y="16" fill="#e6e9ef" font-size="14" font-weight="600">synapsen</text>
    <text x="90" y="16" fill="#5a6473" font-size="11">— assoziativer Memory-Graph, gerichtete Relationen + Hebbian-Koaktivierung</text>
    <g transform="translate(740,0)" font-size="11" fill="#8a94a6">
