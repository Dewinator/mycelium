      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#7aa2f7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9ece6a" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#9ece6a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#9ece6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodePurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bb9af7" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#bb9af7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#bb9af7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeFocus" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0af68" stop-opacity="1"/>
      <stop offset="55%" stop-color="#e0af68" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e0af68" stop-opacity="0"/>
