    <path d="M390,300 Q 440,330 490,370" stroke="#7aa2f7" stroke-width="1.6" fill="none" opacity="0.85"/>
    <path d="M490,370 Q 540,400 590,400" stroke="#7aa2f7" stroke-width="1.6" fill="none" opacity="0.85"/>
    <path d="M490,370 Q 480,440 450,510" stroke="#7aa2f7" stroke-width="1.4" fill="none" opacity="0.8"/>
    <path d="M390,300 Q 450,380 450,510" stroke="#7aa2f7" stroke-width="1.3" fill="none" opacity="0.7"/>
    <path d="M590,400 L 490,370" stroke="#7aa2f7" stroke-width="1.2" fill="none" opacity="0.6"/>
    <path d="M390,300 Q 430,340 490,370" stroke="#e0af68" stroke-width="1.8" fill="none" opacity="0.9" marker-end="url(#arrowYellow)"/>

