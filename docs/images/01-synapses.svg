      <path d="M3,9 L6,12 L11,5" fill="none" stroke="#9ece6a" stroke-width="2"/>
      <text x="20" y="13">hebb</text>
      <rect x="60" y="2" width="56" height="16" rx="4" fill="#1a1f26" stroke="#2e3640"/>
      <text x="72" y="14" fill="#e6e9ef">400</text>
      <text x="100" y="14">▾</text>
      <rect x="130" y="2" width="80" height="16" rx="4" fill="#1a1f26" stroke="#2e3640"/>
      <text x="142" y="14" fill="#e6e9ef">suche…</text>
    </g>
  </g>

