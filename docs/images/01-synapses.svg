    <path d="M180,160 Q 225,210 270,260" stroke="#7aa2f7" stroke-width="1.4" fill="none" opacity="0.8"/>
    <path d="M180,160 Q 150,240 140,320" stroke="#7aa2f7" stroke-width="1.4" fill="none" opacity="0.75"/>
    <path d="M270,260 Q 200,290 140,320" stroke="#7aa2f7" stroke-width="1.4" fill="none" opacity="0.8"/>
    <path d="M270,260 Q 250,210 180,160" stroke="#7aa2f7" stroke-width="1.2" fill="none" opacity="0.7"/>

