    <path d="M660,470 Q 690,490 720,530" stroke="#5a6473" stroke-width="1.2" fill="none" opacity="0.7" stroke-dasharray="2 3"/>
    <path d="M720,530 Q 750,520 780,490" stroke="#5a6473" stroke-width="1.2" fill="none" opacity="0.7" stroke-dasharray="2 3"/>
    <path d="M660,470 Q 720,510 780,490" stroke="#5a6473" stroke-width="1.0" fill="none" opacity="0.6" stroke-dasharray="2 3"/>
    <path d="M720,530 Q 710,570 660,580" stroke="#5a6473" stroke-width="1.0" fill="none" opacity="0.6" stroke-dasharray="2 3"/>

