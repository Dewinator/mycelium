    <g transform="translate(22,70)" font-size="11">
      <rect x="0" y="0" width="496" height="52" rx="8" fill="#14181d" stroke="#232a33"/>
      <circle cx="26" cy="26" r="14" fill="#2a3a5a"/>
      <text x="26" y="30" text-anchor="middle" fill="#7aa2f7" font-weight="700">A</text>
      <text x="52" y="22" fill="#e6e9ef" font-weight="600">person-01</text>
      <text x="52" y="40" fill="#8a94a6" font-size="10">44 begegnungen · letzter kontakt: heute · trusted</text>
      <text x="486" y="30" text-anchor="end" fill="#9ece6a" font-size="10">primary</text>
    </g>
    <g transform="translate(22,130)" font-size="11">
