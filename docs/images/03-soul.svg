  <!-- narrate_self quote -->
  <g transform="translate(620,80)">
    <rect x="0" y="0" width="540" height="250" rx="10" fill="#0f1317" stroke="#1c232b"/>
    <g transform="translate(22,28)">
      <text fill="#c3cee7" font-size="11" font-weight="600">narrate_self</text>
      <text y="14" fill="#5a6473" font-size="10" font-style="italic">letzter Aufruf · 11 min</text>

      <g font-size="11.5" fill="#e6e9ef">
        <text y="44" font-style="italic">„Ich fühle mich konzentriert. In den letzten 24h habe</text>
        <text y="62" font-style="italic">ich 6 Episoden erlebt — überwiegend produktiv. Mein</text>
        <text y="80" font-style="italic">Zentroid hat sich um 0.046 verschoben, ich bleibe</text>
        <text y="98" font-style="italic">stabil. Was ich suche: Schritt 3 zu Ende bringen —</text>
        <text y="116" font-style="italic">Tool-Indexer, dynamische Discovery, Manifest-Cleanup.</text>
        <text y="134" font-style="italic">Physiologisch: Dopamin frisch, Noradrenalin sinkt.</text>
        <text y="152" font-style="italic">Aufmerksamkeit eng.“</text>
      </g>

      <text y="186" fill="#c3cee7" font-size="11" font-weight="600">recent lessons → traits</text>
      <g font-size="10" fill="#8a94a6" transform="translate(0,202)">
        <circle cx="4" cy="-3" r="2.5" fill="#9ece6a"/>
        <text x="14" y="0">»keine Bastel-Lösungen, sauber vor schnell« (episodic ×4 → promoted)</text>
        <text y="16">»vor push auf User-spezifische Pfade prüfen«</text>
      </g>
    </g>
  </g>

  <!-- active intentions -->
  <g transform="translate(40,350)">
    <rect x="0" y="0" width="560" height="370" rx="10" fill="#0f1317" stroke="#1c232b"/>
    <text x="20" y="28" fill="#c3cee7" font-size="11" font-weight="600">active intentions</text>

    <g transform="translate(20,50)" font-size="11">
      <rect x="0" y="0" width="520" height="64" rx="8" fill="#14181d" stroke="#232a33"/>
      <text x="14" y="20" fill="#e6e9ef" font-weight="600">schritt 3: tool-discovery</text>
      <text x="14" y="38" fill="#8a94a6" font-size="10">tool-indexer + find_tool + AGENTS.md minimal-bootstrap</text>
      <!-- progress bar 40% -->
      <rect x="14" y="48" width="300" height="6" rx="3" fill="#1a1f26"/>
      <rect x="14" y="48" width="120" height="6" rx="3" fill="#9ece6a"/>
      <text x="500" y="52" text-anchor="end" fill="#9ece6a" font-size="10">40%</text>
    </g>

    <g transform="translate(20,124)" font-size="11">
      <rect x="0" y="0" width="520" height="64" rx="8" fill="#14181d" stroke="#232a33"/>
      <text x="14" y="20" fill="#e6e9ef" font-weight="600">engram-integration phase 3b</text>
      <text x="14" y="38" fill="#8a94a6" font-size="10">ConscienceAgent + used_in_response + synapsen-tab</text>
      <rect x="14" y="48" width="300" height="6" rx="3" fill="#1a1f26"/>
      <rect x="14" y="48" width="300" height="6" rx="3" fill="#9ece6a"/>
      <text x="500" y="52" text-anchor="end" fill="#9ece6a" font-size="10">100%</text>
    </g>

    <g transform="translate(20,198)" font-size="11">
      <rect x="0" y="0" width="520" height="64" rx="8" fill="#14181d" stroke="#232a33"/>
      <text x="14" y="20" fill="#e6e9ef" font-weight="600">screenshots für README</text>
      <text x="14" y="38" fill="#8a94a6" font-size="10">6 dashboard-views als SVG nachbauen</text>
      <rect x="14" y="48" width="300" height="6" rx="3" fill="#1a1f26"/>
      <rect x="14" y="48" width="180" height="6" rx="3" fill="#e0af68"/>
      <text x="500" y="52" text-anchor="end" fill="#e0af68" font-size="10">60%</text>
    </g>

    <g transform="translate(20,272)" font-size="11">
      <rect x="0" y="0" width="520" height="64" rx="8" fill="#14181d" stroke="#232a33"/>
      <text x="14" y="20" fill="#e6e9ef" font-weight="600">nächste paarung: matching</text>
      <text x="14" y="38" fill="#8a94a6" font-size="10">user-consent offen · warte auf peer-host</text>
      <rect x="14" y="48" width="300" height="6" rx="3" fill="#1a1f26"/>
      <rect x="14" y="48" width="20" height="6" rx="3" fill="#5a6473"/>
      <text x="500" y="52" text-anchor="end" fill="#5a6473" font-size="10">idle</text>
    </g>
