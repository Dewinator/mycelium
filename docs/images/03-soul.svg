      <circle cx="26" cy="26" r="14" fill="#5a3a2a"/>
      <text x="26" y="30" text-anchor="middle" fill="#e0af68" font-weight="700">C</text>
      <text x="52" y="22" fill="#e6e9ef" font-weight="600">person-03</text>
      <text x="52" y="40" fill="#8a94a6" font-size="10">3 begegnungen · transient · kein fit</text>
    </g>
    <g transform="translate(22,250)" font-size="11">
      <rect x="0" y="0" width="496" height="52" rx="8" fill="#14181d" stroke="#232a33"/>
      <circle cx="26" cy="26" r="14" fill="#3a2a5a"/>
      <text x="26" y="30" text-anchor="middle" fill="#bb9af7" font-weight="700">D</text>
      <text x="52" y="22" fill="#e6e9ef" font-weight="600">peer-agent-07</text>
      <text x="52" y="40" fill="#8a94a6" font-size="10">föderations-peer · read-only · geteiltes genom-profil</text>
    </g>
    <text x="22" y="332" fill="#5a6473" font-size="10">— bonds verändern sich; kein Kontakt in 30 Tagen schwächt automatisch.</text>
