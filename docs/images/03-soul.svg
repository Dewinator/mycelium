<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',system-ui,sans-serif">
  <rect width="1200" height="750" fill="#0b0d10"/>
  <rect x="20" y="20" width="1160" height="710" rx="14" fill="#14181d" stroke="#232a33"/>

  <!-- header -->
  <g transform="translate(40,45)">
    <text fill="#e6e9ef" font-size="14" font-weight="600">seele</text>
    <text x="56" y="0" fill="#5a6473" font-size="11">— Identität aus gelebten Episoden, nicht aus Prompt</text>
  </g>

  <!-- identity card -->
  <g transform="translate(40,80)">
    <rect x="0" y="0" width="560" height="250" rx="10" fill="#0f1317" stroke="#1c232b"/>
    <g transform="translate(20,28)">
      <text fill="#c3cee7" font-size="11" font-weight="600">label</text>
      <text y="20" fill="#e6e9ef" font-size="18" font-weight="700">agent · generation 4</text>
      <text y="40" fill="#5a6473" font-size="10">geboren 2026-02-03 · alter 77d · stimmung: zufrieden</text>

      <text y="70" fill="#c3cee7" font-size="11" font-weight="600">traits</text>
      <g transform="translate(0,82)" font-size="10">
        <rect x="0" y="0" width="74" height="22" rx="11" fill="#1a2230" stroke="#2a3a5a"/>
        <text x="37" y="14" text-anchor="middle" fill="#7aa2f7">curious</text>
        <rect x="80" y="0" width="88" height="22" rx="11" fill="#1a2230" stroke="#2a3a5a"/>
        <text x="124" y="14" text-anchor="middle" fill="#7aa2f7">methodical</text>
        <rect x="174" y="0" width="88" height="22" rx="11" fill="#1a2230" stroke="#2a3a5a"/>
        <text x="218" y="14" text-anchor="middle" fill="#7aa2f7">deep-focus</text>
        <rect x="268" y="0" width="92" height="22" rx="11" fill="#1a2230" stroke="#2a3a5a"/>
        <text x="314" y="14" text-anchor="middle" fill="#7aa2f7">risk-averse</text>
        <rect x="366" y="0" width="76" height="22" rx="11" fill="#1a2e1a" stroke="#2a5a2e"/>
        <text x="404" y="14" text-anchor="middle" fill="#9ece6a">honest</text>
        <rect x="448" y="0" width="86" height="22" rx="11" fill="#1a2e1a" stroke="#2a5a2e"/>
        <text x="491" y="14" text-anchor="middle" fill="#9ece6a">persistent</text>
      </g>

      <text y="134" fill="#c3cee7" font-size="11" font-weight="600">key numbers</text>
      <g transform="translate(0,152)" font-size="10" fill="#8a94a6">
        <text y="0">memories</text><text x="100" y="0" fill="#e6e9ef">442</text>
        <text y="16">experiences</text><text x="100" y="16" fill="#e6e9ef">107</text>
        <text y="32">lessons</text><text x="100" y="32" fill="#e6e9ef">14</text>
        <text y="48">traits</text><text x="100" y="48" fill="#e6e9ef">6</text>

        <text x="220" y="0">bonded</text><text x="340" y="0" fill="#e6e9ef">4 people</text>
        <text x="220" y="16">fitness</text><text x="340" y="16" fill="#9ece6a">0.72 ↑</text>
        <text x="220" y="32">centroid-shift/7d</text><text x="340" y="32" fill="#e6e9ef">0.046</text>
        <text x="220" y="48">last digest</text><text x="340" y="48" fill="#e6e9ef">2h ago</text>
