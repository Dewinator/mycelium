<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ece6a"/>
    </marker>
    <marker id="arrDim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#565a68"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#bb9af7"/>
    </marker>
  </defs>

  <rect width="900" height="460" fill="#0b0d10"/>

  <!-- section headline -->
  <text x="450" y="32" text-anchor="middle" fill="#6b7280" font-size="12" letter-spacing="2">LOCAL FIRST</text>

  <!-- CENTER: your local agent + mycelium as one organism -->
  <rect x="270" y="140" width="360" height="200" rx="18" ry="18"
        fill="#1a1d23" stroke="#9ece6a" stroke-width="2"/>

  <!-- upper half: local agent -->
  <text x="450" y="180" text-anchor="middle" fill="#c0caf5" font-size="22" font-weight="700">your local agent</text>
  <text x="450" y="204" text-anchor="middle" fill="#a9b1d6" font-size="13">small local LLM (Qwen · Llama · Gemma · …)</text>

  <!-- divider inside box -->
  <line x1="300" y1="224" x2="600" y2="224" stroke="#2d3139" stroke-width="1"/>

  <!-- lower half: mycelium -->
  <text x="450" y="252" text-anchor="middle" fill="#9ece6a" font-size="18" font-weight="600">mycelium</text>
  <text x="450" y="275" text-anchor="middle" fill="#a9b1d6" font-size="12">memory · affect · neurochemistry</text>
  <text x="450" y="292" text-anchor="middle" fill="#a9b1d6" font-size="12">soul · genome · federation</text>
  <text x="450" y="319" text-anchor="middle" fill="#6b7280" font-size="11" font-style="italic">Supabase + pgvector + Ollama embeddings, all local</text>

  <!-- LEFT: you -->
  <rect x="40" y="180" width="170" height="80" rx="12" ry="12"
        fill="#1a1d23" stroke="#7aa2f7" stroke-width="1.5"/>
  <text x="125" y="212" text-anchor="middle" fill="#c0caf5" font-size="16" font-weight="600">you</text>
  <text x="125" y="233" text-anchor="middle" fill="#a9b1d6" font-size="11">experience · intentions</text>
  <text x="125" y="248" text-anchor="middle" fill="#a9b1d6" font-size="11">decisions · taste</text>
  <!-- arrow you → center -->
  <line x1="212" y1="220" x2="268" y2="220" stroke="#7aa2f7" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- RIGHT: cloud LLM as optional teacher — deliberately dimmed -->
  <rect x="690" y="180" width="170" height="80" rx="12" ry="12"
        fill="#12141a" stroke="#565a68" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="775" y="208" text-anchor="middle" fill="#8b92a3" font-size="14" font-weight="500">cloud LLM</text>
  <text x="775" y="226" text-anchor="middle" fill="#6b7280" font-size="10" font-style="italic">optional teacher</text>
  <text x="775" y="246" text-anchor="middle" fill="#6b7280" font-size="10">Claude · GPT · …</text>
  <!-- arrow teacher → center (thin, dashed) -->
  <line x1="688" y1="220" x2="632" y2="220" stroke="#565a68" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrDim)"/>

  <!-- BOTTOM: swarm -->
  <rect x="350" y="380" width="200" height="60" rx="12" ry="12"
        fill="#1a1d23" stroke="#bb9af7" stroke-width="1.5"/>
  <text x="450" y="406" text-anchor="middle" fill="#c0caf5" font-size="15" font-weight="600">swarm of peers</text>
  <text x="450" y="424" text-anchor="middle" fill="#a9b1d6" font-size="11">federation · mutual consent · mating</text>
  <!-- bidirectional arrow center ↔ swarm -->
  <line x1="450" y1="342" x2="450" y2="378" stroke="#bb9af7" stroke-width="2" marker-end="url(#arrPurple)"/>
  <line x1="460" y1="378" x2="460" y2="342" stroke="#bb9af7" stroke-width="2" marker-end="url(#arrPurple)"/>

  <!-- footer tagline -->
  <text x="450" y="80" text-anchor="middle" fill="#c0caf5" font-size="14" font-weight="500">together, our small machines beat the server farm</text>
  <text x="450" y="100" text-anchor="middle" fill="#6b7280" font-size="11" font-style="italic">diversity of lived experience · not GPU hours</text>
</svg>
